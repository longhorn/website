name: Codespell

on:
  push:
  pull_request:
    branches:
    - master

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      with:
        fetch-depth: 1
    - name: Check code spell
      uses: codespell-project/actions-codespell@22ff5a2e4b591290baf82d47c9feadac31c65441 # v1
      with:
        check_filenames: true
        ignore_words_file: .codespellignore
